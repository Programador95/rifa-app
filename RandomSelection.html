<div class="random-selection-container">

    <!-- Container da Seleção Aleatória -->
    <div class="random-selection-controls">
        <label for="quantidadeAleatoria">🎲 Seleção Aleatória:</label>
        <input type="number" id="quantidadeAleatoria" min="1" max="50" value="1">
        <button type="button" id="botaoSelecionar" onclick="selecionarAleatorio()">
            Selecionar
        </button>
    </div>

    <div class="legenda-cores">
        <span>Cores:</span>
        <div class="tooltip-item" data-tooltip="Os números em branco estão disponíveis para serem escolhidos">
            <div class="color-box disponivel"></div>
            <span>Disponível</span>
        </div>
        <div class="tooltip-item" data-tooltip="Os números em verde são os seus números selecionados">
            <div class="color-box seus-numeros"></div>
            <span>Seus números</span>
        </div>
        <div class="tooltip-item"
            data-tooltip="Os números em laranja estão pré-reservados por outros usuários (válido por 10 minutos)">
            <div class="color-box pre-reservado"></div>
            <span>Pré-reservado</span>
        </div>
        <div class="tooltip-item" data-tooltip="Os números em vermelho já foram comprados e não estão mais disponíveis">
            <div class="color-box comprado"></div>
            <span>Comprado</span>
        </div>
    </div>
</div>
