<style>

  #btnRecovery {

    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
    padding: var(--btn-padding);

    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    width: auto;
  }

  #btnRecovery:hover {
    background: #ffc107;
    color: #fff;
    border-color: #ffc107;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(255, 193, 7, 0.4);
  }

  /* ===== BOTÃO SELECIONAR ALEATÓRIO ===== */

    font-size: 16px;
    border: none;
    border-radius: var(--btn-radius);
    cursor: pointer;
    white-space: nowrap;

    box-sizing: border-box;
  }

  @media (min-width: 1025px) {
    #botaoSelecionar {
      padding: 10px 16px;
      font-size: 16px;
    }
  }

  @media (max-width: 768px) {
    #botaoSelecionar {
      padding: 10px 16px;
      font-size: 16px;
    }
  }

  /* ===== BOTÕES DE AÇÃO (COMPRAR, LIMPAR) ===== */
  /* Mobile-first: valores grandes na base, desktop reduz */
  #btnComprar {
    background: var(--color-primary-btn-gradient);
    color: white;
    border: none;
    border-radius: var(--input-radius);
    cursor: pointer;
    font-weight: 600;
    font-size: 30px;
    padding: 20px 50px;
    min-height: 20px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px var(--color-primary-shadow);
    box-sizing: border-box;
  }

  #btnLimpar {
    background: var(--color-danger-gradient);
    color: white;
    border: none;
    border-radius: var(--input-radius);
    cursor: pointer;
    font-weight: 600;
    font-size: 30px;
    padding: 20px 50px;
    min-height: 20px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    box-sizing: border-box;
  }

  #btnRecuperar {
    background: linear-gradient(135deg, #ff9800, #f57c00);
    color: white;
    border: none;
    border-radius: var(--input-radius);
    cursor: pointer;
    font-weight: 600;
    font-size: 30px;
    padding: 20px 50px;
    min-height: 20px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(255, 152, 0, 0.35);
    box-sizing: border-box;
  }

    #btnComprar,
    #btnLimpar,
    #btnRecuperar {
      width: auto;
      font-size: var(--fs-base);
      padding: var(--btn-padding);
      min-height: auto;
    }
  }

  /* ===== MOBILE: Comprar/Limpar/Recuperar lado a lado ===== */
  @media (max-width: 768px) {
    .action-buttons {
      flex-wrap: nowrap;
      gap: 14px;
    }
    .action-buttons #btnComprar,
    .action-buttons #btnLimpar,
    .action-buttons #btnRecuperar {
      flex: 1 1 0;
      width: 0;
    }
  }
  .scroll-down-btn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 60px;
    background: var(--color-success);
    border: none;
    border-radius: var(--radius-full);
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
    z-index: 1000;
    transition: all 0.3s ease;
    display: var(--show-scroll-btns);
    align-items: center;
    justify-content: center;
    animation: bounce 2s infinite;
  }

  .scroll-down-btn:hover {
    background: #45a049;
    transform: translateX(-50%) scale(1.1);
    box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
  }

  .scroll-down-btn::after {
    content: '';
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 15px solid white;
  }

  @keyframes bounce {

    0%,
    20%,
    50%,
    80%,
    100% {
      transform: translateX(-50%) translateY(0);
    }

    40% {
      transform: translateX(-50%) translateY(-10px);
    }

    60% {
      transform: translateX(-50%) translateY(-5px);
    }
  }

  .scroll-down-btn.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .scroll-up-btn {
    position: fixed;
    top: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    background: #2196F3;
    border: none;
    border-radius: var(--radius-full);
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
    z-index: 1000;
    transition: all 0.3s ease;
    display: var(--show-scroll-btns);
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    animation: pulse 2s infinite;
  }

  .scroll-up-btn.show {
    opacity: 1;
    pointer-events: all;
  }

  .scroll-up-btn:hover {
    background: #1976D2;
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(33, 150, 243, 0.6);
  }

  .scroll-up-btn::after {
    content: '';
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 15px solid white;
  }

  @keyframes pulse {
    0% {
      transform: scale(1);
    }

    50% {
      transform: scale(1.05);
    }

    100% {
      transform: scale(1);
    }
  }

  .whatsapp-button {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--color-whatsapp);
    color: white;
    padding: 20px 25px;
    border-radius: var(--radius-full);
    font-size: 32px;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    z-index: 1000;
    transition: all 0.3s ease;
  }

  .whatsapp-button:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
  }

  @media (min-width: 1025px) {
    /* Recovery tem border 2px, usar box-sizing para igualar ao Confirmar (sem border) */

      box-sizing: border-box;

    }
  }

  /* ===== AJUSTE TAMANHO BOTÕES MOBILE ===== */
  @media (max-width: 768px) {
    /* No mobile, Confirmar precisa ficar do mesmo tamanho visual que o Recovery */
    .btn-confirmar-dados {
      padding: 18px 26px;
    }
  }

    #btnComprar:hover,
    #btnLimpar:hover,
    #botaoSelecionar:hover,
    .copy-pix-btn:hover,

    }
  }

    border-radius: 18px;

  }

  }

    flex-direction: column;
    align-items: stretch;
    gap: 0;
  }
  .floating-buttons {

  }
