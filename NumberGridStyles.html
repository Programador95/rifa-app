<style>
/* =============================================================
   NUMBER GRID STYLES - Grid de números e estados
   ============================================================= */
/* ===== GRID CONTAINER ===== */
.number-grid-container {
  padding: 0;
  margin: 0;
  width: 100%;
  box-sizing: border-box;
}
#numeros {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--grid-cell-min), 1fr));
  gap: var(--grid-gap);
  padding: var(--grid-padding);
  max-height: var(--grid-max-height);
  min-height: var(--grid-min-height);
  overflow-y: auto;
  overflow-x: hidden;
  border: 1px solid var(--color-border-light);
  border-radius: var(--grid-radius);
  background: var(--color-card-alt);
  box-sizing: border-box;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: auto;
  /* ✅ REMOVIDO: contain: layout style paint; — bloqueava pinch-to-zoom */
  /* ✅ NOVO: Permitir scroll vertical e pinch-to-zoom */
  touch-action: pan-y pinch-zoom;
}
/* ===== NÚMEROS - CÉLULA ===== */
label.numero {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: var(--grid-cell-height);
  margin: 0;
  padding: 0;
  position: relative;
  font-size: var(--grid-cell-font);
  font-weight: var(--grid-cell-font-weight);
  border-radius: var(--radius-md);
  cursor: pointer;
  box-sizing: border-box;
  /* Estado padrão: Disponível */
  background-color: var(--color-card);
  color: var(--color-success-dark);
  border: 2px solid var(--color-border-light);
  transition: all var(--transition-fast, 150ms) ease;
}
label.numero:hover {
  border-color: var(--color-success);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}
/* ===== CHECKBOX OCULTO ===== */
label.numero input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  margin: 0;
  padding: 0;
  opacity: 0;
  cursor: pointer;
  z-index: 2;
  border: none;
}
/* ===== TEXTO DO NÚMERO ===== */
label.numero span {
  z-index: 1;
  pointer-events: none;
  margin: 0;
  padding: 0;
  line-height: 1;
  display: block;
}
/* ===== ESTADOS ===== */
label.numero:has(input:checked):not(.numero-indisponivel):not(.numero-pre-reservado):not(.numero-comprado-usuario) {
  background-color: var(--color-success);
  color: white;
  border-color: var(--color-success-border);
  box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.15);
  animation: selectPulse 0.2s ease-out;
}
/* ✅ Checkmark de acessibilidade */
label.numero:has(input:checked):not(.numero-indisponivel):not(.numero-pre-reservado):not(.numero-comprado-usuario)::after {
  content: '✓';
  position: absolute;
  top: 2px;
  right: 4px;
  font-size: 11px;
  color: rgba(255,255,255,0.85);
  font-weight: bold;
  line-height: 1;
  pointer-events: none;
}
@keyframes selectPulse {
  0% { transform: scale(1); }
  40% { transform: scale(0.92); }
  100% { transform: scale(1); }
}
/* Fallback */
label.numero.numero-disponivel input:checked + span {
  color: var(--color-success-dark);
}
/* 3. INDISPONÍVEL / RESERVADO (Outros) */
label.numero.numero-indisponivel {
  background-color: var(--color-danger-bg);
  color: var(--color-danger);
  border-color: var(--color-danger-border);
  opacity: 0.6;
  cursor: not-allowed;
}
label.numero.numero-indisponivel input {
  cursor: not-allowed;
  pointer-events: none;
}
/* 4. PRÉ-RESERVADO (Outros - Amarelo) */
label.numero.numero-pre-reservado {
  background-color: var(--color-warning-bg);
  color: var(--color-warning-dark);
  border-color: var(--color-warning-border);
  opacity: 0.7;
  cursor: not-allowed;
}
label.numero.numero-pre-reservado input {
  cursor: not-allowed;
  pointer-events: none;
}
label.numero.numero-pre-reservado span {
  font-weight: bold;
}
/* 5. COMPRADO (Pelo próprio usuário) */
label.numero.numero-comprado-usuario {
  background-color: var(--color-success);
  color: var(--color-success-dark);
  border-color: var(--color-success-border);
  opacity: 0.6;
  cursor: not-allowed;
}
label.numero.numero-comprado-usuario input {
  cursor: not-allowed;
  pointer-events: none;
}
/* ===== DESABILITAR HOVER EM TOUCH ===== */
@media (hover: none) {
  label.numero:hover {
    transform: none;
    box-shadow: none;
  }
}
</style>
<!-- Script de compatibilidade para :has() em browsers antigos -->
<script>
  document.addEventListener('change', function(e) {
    if (e.target.type === 'checkbox' && e.target.closest('label.numero')) {
      var label = e.target.closest('label.numero');
      if (e.target.checked) {
        label.style.backgroundColor = '#4CAF50';
        label.style.borderColor = '#388E3C';
        var span = label.querySelector('span');
        if (span) span.style.color = '#1B5E20';
      } else {
        label.style.backgroundColor = '';
        label.style.borderColor = '';
        var span = label.querySelector('span');
        if (span) span.style.color = '';
      }
    }
  });
</script>
