<div class="form-section">

  <form id="form">
    <div class="form-row">
      <div class="form-group name-field">
        <label><strong>Nome:</strong></label>
        <input type="text" name="nome" id="nome" required maxlength="30" pattern="[\p{L}\s]+"
          title="Apenas letras e espaços são permitidos (máximo 30 caracteres)" onkeypress="return validarNome(event)"
          oninput="validarNomeInput(event)" onpaste="limparNomeColar(event)" placeholder="Digite seu nome">
      </div>

      <div class="form-group phone-field">
        <label><strong>Telefone:</strong></label>
        <input type="tel" id="telefone" name="telefone" maxlength="15" required placeholder="(00) 00000-0000">
      </div>

      <button type="button" id="btnConfirmarDados" class="btn-confirmar-dados" onclick="confirmarDados()">
        <span>✅ Confirmar Dados</span>
      </button>
    </div>
